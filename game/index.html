<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tower Defense</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #hud {
    display: flex;
    gap: 18px;
    padding: 8px 16px;
    font-size: 16px;
    font-weight: 600;
  }
  #hud span { display: flex; align-items: center; gap: 4px; }
  canvas { border-radius: 8px; display: block; }
  #controls {
    display: flex;
    gap: 10px;
    padding: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: #16213e;
    border: 2px solid #0f3460;
    color: #e94560;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:active, .btn.active { background: #0f3460; }
  .btn:disabled { opacity: 0.4; }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 700;
    color: #e94560;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div id="hud">
  <span id="livesDisplay">&#10084; 20</span>
  <span id="goldDisplay">&#9733; 100</span>
  <span id="waveDisplay">Wave: 1</span>
</div>
<canvas id="game"></canvas>
<div id="controls">
  <button class="btn active" data-tower="basic">Basic (25g)</button>
  <button class="btn" data-tower="sniper">Sniper (50g)</button>
  <button class="btn" data-tower="rapid">Rapid (40g)</button>
  <button class="btn" id="undoBtn" disabled>Undo</button>
  <button class="btn" id="startWaveBtn">Send Wave</button>
</div>
<div id="message"></div>

<script>
// ============ SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const maxW = Math.min(window.innerWidth - 16, 480);
  const maxH = Math.min(window.innerHeight - 120, 640);
  let w = maxW;
  let h = w * (4/3);
  if (h > maxH) { h = maxH; w = h * (3/4); }
  canvas.width = Math.floor(w);
  canvas.height = Math.floor(h);
}
resize();
window.addEventListener('resize', resize);

const TILE = Math.floor(canvas.width / 12);
const COLS = Math.floor(canvas.width / TILE);
const ROWS = Math.floor(canvas.height / TILE);

// ============ PATH ============
const pathPoints = [
  [0, 2], [3, 2], [3, 5], [8, 5], [8, 2], [11, 2],
  [11, 8], [4, 8], [4, 11], [8, 11], [8, 14], [11, 14]
];

const waypoints = pathPoints.map(([c, r]) => ({
  x: c * TILE + TILE / 2,
  y: r * TILE + TILE / 2
}));

const pathTiles = new Set();
for (let i = 0; i < pathPoints.length - 1; i++) {
  const [c1, r1] = pathPoints[i];
  const [c2, r2] = pathPoints[i + 1];
  if (c1 === c2) {
    for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) pathTiles.add(`${c1},${r}`);
  } else {
    for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++) pathTiles.add(`${c},${r1}`);
  }
}

// ============ GAME STATE ============
let lives = 20;
let gold = 100;
let wave = 0;
let waveActive = false;
let enemiesSpawned = 0;
let enemiesToSpawn = 0;
let spawnTimer = 0;
let gameOver = false;

const towers = [];
const enemies = [];
const projectiles = [];

// Towers placed this round (before wave sent) — undoable
const undoStack = [];

const towerTypes = {
  basic:  { cost: 25, range: TILE * 2.8, damage: 1, fireRate: 60, color: '#4ecca3', radius: TILE * 0.35 },
  sniper: { cost: 50, range: TILE * 4.5, damage: 3, fireRate: 120, color: '#e94560', radius: TILE * 0.35 },
  rapid:  { cost: 40, range: TILE * 2.2, damage: 0.5, fireRate: 20, color: '#f9a825', radius: TILE * 0.3 },
};

let selectedTower = 'basic';

const occupiedTiles = new Set();

// ============ DRAG STATE ============
let dragging = false;       // currently dragging a tower preview
let dragTower = null;       // { type, col, row } — snapped position
let dragPixel = { x: 0, y: 0 }; // raw finger position
let dragValid = false;      // is current position a valid placement?
let dragCharged = false;    // has gold been deducted for this drag?

// ============ UI ============
const undoBtn = document.getElementById('undoBtn');

document.querySelectorAll('[data-tower]').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedTower = btn.dataset.tower;
    document.querySelectorAll('[data-tower]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('startWaveBtn').addEventListener('click', startWave);
undoBtn.addEventListener('click', undoTower);

function showMessage(text, duration = 1500) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, duration);
}

function updateHUD() {
  document.getElementById('livesDisplay').innerHTML = `&#10084; ${lives}`;
  document.getElementById('goldDisplay').innerHTML = `&#9733; ${gold}`;
  document.getElementById('waveDisplay').textContent = `Wave: ${wave || 1}`;
  undoBtn.disabled = undoStack.length === 0;
}

// ============ UNDO ============
function undoTower() {
  if (undoStack.length === 0) return;
  const entry = undoStack.pop();
  // Remove tower from towers array
  const idx = towers.indexOf(entry.tower);
  if (idx !== -1) towers.splice(idx, 1);
  // Free tile
  occupiedTiles.delete(entry.key);
  // Refund gold
  gold += entry.cost;
  updateHUD();
}

// ============ WAVES ============
function startWave() {
  if (waveActive || gameOver) return;
  wave++;
  waveActive = true;
  enemiesSpawned = 0;
  enemiesToSpawn = 2 + wave * 2;
  spawnTimer = 0;
  // Lock in all towers — clear undo stack
  undoStack.length = 0;
  updateHUD();
}

function spawnEnemy() {
  const hp = 2 + wave * 1.5;
  enemies.push({
    x: waypoints[0].x,
    y: waypoints[0].y,
    hp: hp,
    maxHp: hp,
    speed: 0.7 + wave * 0.12,
    waypointIdx: 1,
    reward: 5 + wave,
  });
}

// ============ DRAG & PLACE ============
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function snapToGrid(px, py) {
  const col = Math.floor(px / TILE);
  const row = Math.floor(py / TILE);
  return { col, row };
}

function isValidPlacement(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  const key = `${col},${row}`;
  if (pathTiles.has(key) || occupiedTiles.has(key)) return false;
  return true;
}

function onDragStart(e) {
  if (gameOver) return;
  e.preventDefault();
  const p = getCanvasPos(e);
  const type = towerTypes[selectedTower];
  if (gold < type.cost) { showMessage('Not enough gold!'); return; }

  dragging = true;
  dragCharged = false;
  dragPixel = p;
  const snap = snapToGrid(p.x, p.y);
  dragTower = { type: selectedTower, col: snap.col, row: snap.row };
  dragValid = isValidPlacement(snap.col, snap.row);
}

function onDragMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const p = getCanvasPos(e);
  dragPixel = p;
  // Offset upward so finger doesn't cover the tower
  const offsetY = p.y - TILE * 1.5;
  const snap = snapToGrid(p.x, offsetY);
  dragTower.col = snap.col;
  dragTower.row = snap.row;
  dragValid = isValidPlacement(snap.col, snap.row);
}

function onDragEnd(e) {
  if (!dragging) return;
  e.preventDefault();
  dragging = false;

  if (!dragValid) {
    dragTower = null;
    return;
  }

  const col = dragTower.col;
  const row = dragTower.row;
  const key = `${col},${row}`;
  const type = towerTypes[dragTower.type];

  if (gold < type.cost) {
    showMessage('Not enough gold!');
    dragTower = null;
    return;
  }

  gold -= type.cost;
  occupiedTiles.add(key);
  const tower = {
    x: col * TILE + TILE / 2,
    y: row * TILE + TILE / 2,
    type: dragTower.type,
    ...type,
    cooldown: 0,
  };
  towers.push(tower);
  undoStack.push({ tower, key, cost: type.cost });
  updateHUD();

  dragTower = null;
}

// Touch events
canvas.addEventListener('touchstart', onDragStart);
canvas.addEventListener('touchmove', onDragMove);
canvas.addEventListener('touchend', onDragEnd);

// Mouse events (for desktop testing)
canvas.addEventListener('mousedown', onDragStart);
canvas.addEventListener('mousemove', onDragMove);
canvas.addEventListener('mouseup', onDragEnd);

// ============ UPDATE ============
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function update() {
  if (gameOver) return;

  // Spawn enemies
  if (waveActive && enemiesSpawned < enemiesToSpawn) {
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnEnemy();
      enemiesSpawned++;
      spawnTimer = 30;
    }
  }

  // Move enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const wp = waypoints[e.waypointIdx];
    const dx = wp.x - e.x;
    const dy = wp.y - e.y;
    const d = Math.hypot(dx, dy);

    if (d < e.speed) {
      e.waypointIdx++;
      if (e.waypointIdx >= waypoints.length) {
        enemies.splice(i, 1);
        lives--;
        updateHUD();
        if (lives <= 0) {
          gameOver = true;
          showMessage('Game Over!', 99999);
        }
        continue;
      }
    } else {
      e.x += (dx / d) * e.speed;
      e.y += (dy / d) * e.speed;
    }
  }

  // Tower shooting
  for (const t of towers) {
    if (t.cooldown > 0) { t.cooldown--; continue; }
    let target = null;
    let closest = Infinity;
    for (const e of enemies) {
      const d = dist(t, e);
      if (d < t.range && d < closest) { closest = d; target = e; }
    }
    if (target) {
      t.cooldown = t.fireRate;
      projectiles.push({
        x: t.x, y: t.y,
        tx: target.x, ty: target.y,
        target: target,
        damage: t.damage,
        speed: 5,
        color: t.color,
      });
    }
  }

  // Move projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (p.target && p.target.hp > 0) {
      p.tx = p.target.x;
      p.ty = p.target.y;
    }
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    const d = Math.hypot(dx, dy);
    if (d < p.speed) {
      if (p.target && p.target.hp > 0) {
        p.target.hp -= p.damage;
        if (p.target.hp <= 0) {
          gold += p.target.reward;
          updateHUD();
          const idx = enemies.indexOf(p.target);
          if (idx !== -1) enemies.splice(idx, 1);
        }
      }
      projectiles.splice(i, 1);
    } else {
      p.x += (dx / d) * p.speed;
      p.y += (dy / d) * p.speed;
    }
  }

  // Check wave complete
  if (waveActive && enemiesSpawned >= enemiesToSpawn && enemies.length === 0) {
    waveActive = false;
    gold += 10 + wave * 5;
    updateHUD();
    showMessage(`Wave ${wave} complete! +${10 + wave * 5}g`);
  }
}

// ============ DRAW ============
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#1a2744';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * TILE, 0); ctx.lineTo(c * TILE, canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * TILE); ctx.lineTo(canvas.width, r * TILE); ctx.stroke();
  }

  // Path tiles
  ctx.fillStyle = '#2a2a4a';
  for (const key of pathTiles) {
    const [c, r] = key.split(',').map(Number);
    ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
  }

  // Path direction line
  ctx.strokeStyle = '#3a3a5a';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(waypoints[0].x, waypoints[0].y);
  for (let i = 1; i < waypoints.length; i++) {
    ctx.lineTo(waypoints[i].x, waypoints[i].y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Towers
  for (const t of towers) {
    // Range circle
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
    ctx.fillStyle = t.color + '10';
    ctx.fill();

    // Tower body
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
    ctx.fillStyle = t.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ---- DRAG PREVIEW ----
  if (dragging && dragTower) {
    const px = dragTower.col * TILE + TILE / 2;
    const py = dragTower.row * TILE + TILE / 2;
    const type = towerTypes[dragTower.type];

    // Highlight tile
    ctx.fillStyle = dragValid ? 'rgba(78, 204, 163, 0.25)' : 'rgba(233, 69, 96, 0.25)';
    ctx.fillRect(dragTower.col * TILE, dragTower.row * TILE, TILE, TILE);
    ctx.strokeStyle = dragValid ? '#4ecca3' : '#e94560';
    ctx.lineWidth = 2;
    ctx.strokeRect(dragTower.col * TILE, dragTower.row * TILE, TILE, TILE);

    // Range circle preview
    ctx.beginPath();
    ctx.arc(px, py, type.range, 0, Math.PI * 2);
    ctx.fillStyle = (dragValid ? type.color : '#e94560') + '15';
    ctx.fill();
    ctx.strokeStyle = (dragValid ? type.color : '#e94560') + '40';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Ghost tower
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(px, py, type.radius, 0, Math.PI * 2);
    ctx.fillStyle = dragValid ? type.color : '#e94560';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Enemies
  for (const e of enemies) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, TILE * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#e94560';
    ctx.fill();

    // HP bar
    const barW = TILE * 0.7;
    const barH = 4;
    const barX = e.x - barW / 2;
    const barY = e.y - TILE * 0.5;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#4ecca3' : '#e94560';
    ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
  }

  // Projectiles
  for (const p of projectiles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
}

// ============ GAME LOOP ============
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

updateHUD();
showMessage('Drag towers onto the grid!', 2500);
loop();
</script>
</body>
</html>
