<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & TV Search</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 16px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: #58a6ff;
        }

        /* Search bar */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #161b22;
            color: #e6edf3;
            font-size: 16px;
        }

        .search-bar button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #238636;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .search-bar button:active { background: #2ea043; }

        /* Type toggle */
        .type-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .type-toggle button {
            flex: 1;
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #161b22;
            color: #8b949e;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .type-toggle button.active {
            background: #1f6feb;
            color: #fff;
            border-color: #1f6feb;
        }

        /* Filters */
        .filters {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .filters summary {
            font-weight: 600;
            color: #58a6ff;
            cursor: pointer;
            font-size: 14px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 4px; }

        .filter-group.full-width { grid-column: 1 / -1; }

        .filter-group label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #e6edf3;
            font-size: 14px;
        }

        /* Results */
        .status {
            text-align: center;
            color: #8b949e;
            padding: 20px;
            font-size: 14px;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            display: flex;
            gap: 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
        }

        .card img {
            width: 80px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
            background: #30363d;
        }

        .card-info { flex: 1; min-width: 0; }

        .card-info h3 {
            font-size: 15px;
            margin-bottom: 4px;
            color: #e6edf3;
        }

        .card-info .meta {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .badges { display: flex; flex-wrap: wrap; gap: 4px; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.rating {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
        }

        .badge.rt {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .badge.rt.fresh {
            background: #14532d;
            color: #86efac;
        }

        .badge.genre {
            background: #1e1b4b;
            color: #a5b4fc;
        }

        .badge.imdb {
            background: #422006;
            color: #fcd34d;
        }

        /* Detail modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            overflow-y: auto;
            padding: 16px;
        }

        .modal-overlay.open { display: block; }

        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
            padding: 0 4px;
        }

        .modal-poster {
            width: 100%;
            max-width: 200px;
            display: block;
            margin: 12px auto;
            border-radius: 8px;
        }

        .modal h2 {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .modal .detail-meta {
            color: #8b949e;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .modal .plot {
            font-size: 14px;
            line-height: 1.5;
            color: #c9d1d9;
            margin: 12px 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
            font-size: 13px;
        }

        .detail-row .label { color: #8b949e; }
        .detail-row .value { color: #e6edf3; text-align: right; max-width: 60%; }

        .back-link {
            display: inline-block;
            margin-bottom: 12px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
        }

        .load-more {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #161b22;
            color: #58a6ff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .load-more:active { background: #1c2128; }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Movie & TV Search</h1>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search movies & TV shows..." autocomplete="off">
        <button id="searchBtn">Search</button>
    </div>

    <div class="type-toggle">
        <button class="active" data-type="">All</button>
        <button data-type="movie">Movies</button>
        <button data-type="series">TV Shows</button>
    </div>

    <details class="filters" open>
        <summary>Filters</summary>
        <div class="filter-grid">
            <div class="filter-group">
                <label>Content Rating</label>
                <select id="filterRating">
                    <option value="">Any</option>
                    <option value="G">G</option>
                    <option value="PG">PG</option>
                    <option value="PG-13">PG-13</option>
                    <option value="R">R</option>
                    <option value="NC-17">NC-17</option>
                    <option value="TV-Y">TV-Y</option>
                    <option value="TV-G">TV-G</option>
                    <option value="TV-PG">TV-PG</option>
                    <option value="TV-14">TV-14</option>
                    <option value="TV-MA">TV-MA</option>
                    <option value="Not Rated">Not Rated</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Min Rotten Tomatoes</label>
                <input type="number" id="filterRT" min="0" max="100" placeholder="e.g. 75" step="5">
            </div>
            <div class="filter-group full-width">
                <label>Genre</label>
                <select id="filterGenre">
                    <option value="">Any</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Animation">Animation</option>
                    <option value="Biography">Biography</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Crime">Crime</option>
                    <option value="Documentary">Documentary</option>
                    <option value="Drama">Drama</option>
                    <option value="Family">Family</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Film-Noir">Film-Noir</option>
                    <option value="History">History</option>
                    <option value="Horror">Horror</option>
                    <option value="Music">Music</option>
                    <option value="Musical">Musical</option>
                    <option value="Mystery">Mystery</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Sport">Sport</option>
                    <option value="Thriller">Thriller</option>
                    <option value="War">War</option>
                    <option value="Western">Western</option>
                </select>
            </div>
        </div>
    </details>

    <div id="status" class="status">Search for a movie or TV show to get started.</div>
    <div id="results" class="results"></div>
    <button id="loadMore" class="load-more" style="display:none;">Load More Results</button>

    <div id="modal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_KEY = '9f12a726';
        const BASE = 'https://www.omdbapi.com/';

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');
        const loadMoreBtn = document.getElementById('loadMore');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const filterRating = document.getElementById('filterRating');
        const filterRT = document.getElementById('filterRT');
        const filterGenre = document.getElementById('filterGenre');

        let currentType = '';
        let currentQuery = '';
        let currentPage = 1;
        let totalResults = 0;

        // Type toggle
        document.querySelectorAll('.type-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.type-toggle .active').classList.remove('active');
                btn.classList.add('active');
                currentType = btn.dataset.type;
            });
        });

        // Search
        searchBtn.addEventListener('click', () => doSearch());
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

        async function doSearch() {
            const q = searchInput.value.trim();
            if (!q) return;
            currentQuery = q;
            currentPage = 1;
            resultsDiv.innerHTML = '';
            loadMoreBtn.style.display = 'none';
            statusDiv.innerHTML = '<div class="spinner"></div>';
            await fetchPage();
        }

        async function fetchPage() {
            let url = `${BASE}?apikey=${API_KEY}&s=${encodeURIComponent(currentQuery)}&page=${currentPage}`;
            if (currentType) url += `&type=${currentType}`;

            try {
                const resp = await fetch(url);
                const data = await resp.json();

                if (data.Response === 'False') {
                    statusDiv.textContent = currentPage === 1
                        ? `No results found for "${currentQuery}".`
                        : 'No more results.';
                    loadMoreBtn.style.display = 'none';
                    return;
                }

                totalResults = parseInt(data.totalResults, 10);

                // Fetch full details for each result to get ratings/genre
                const details = await Promise.all(
                    data.Search.map(item => fetchDetails(item.imdbID))
                );

                const filtered = applyFilters(details);

                if (currentPage === 1 && filtered.length === 0 && details.length > 0) {
                    statusDiv.textContent = `Found results but none match your filters. Try adjusting filters or load more.`;
                } else if (currentPage === 1) {
                    statusDiv.textContent = `Showing results for "${currentQuery}" (${totalResults} total found)`;
                }

                filtered.forEach(item => resultsDiv.appendChild(createCard(item)));

                if (currentPage * 10 < totalResults) {
                    loadMoreBtn.style.display = 'block';
                } else {
                    loadMoreBtn.style.display = 'none';
                }
            } catch (err) {
                statusDiv.textContent = 'Error fetching results. Check your connection.';
                console.error(err);
            }
        }

        async function fetchDetails(imdbID) {
            const resp = await fetch(`${BASE}?apikey=${API_KEY}&i=${imdbID}`);
            return resp.json();
        }

        function getRT(item) {
            if (!item.Ratings) return null;
            const rt = item.Ratings.find(r => r.Source === 'Rotten Tomatoes');
            if (!rt) return null;
            return parseInt(rt.Value, 10);
        }

        function applyFilters(items) {
            const rating = filterRating.value;
            const minRT = filterRT.value ? parseInt(filterRT.value, 10) : null;
            const genre = filterGenre.value;

            return items.filter(item => {
                if (rating && item.Rated !== rating) return false;
                if (genre && (!item.Genre || !item.Genre.includes(genre))) return false;
                if (minRT !== null) {
                    const rt = getRT(item);
                    if (rt === null || rt < minRT) return false;
                }
                return true;
            });
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';
            card.addEventListener('click', () => showDetail(item));

            const poster = item.Poster && item.Poster !== 'N/A'
                ? item.Poster
                : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="120"><rect fill="%2330363d" width="80" height="120"/><text x="40" y="65" text-anchor="middle" fill="%238b949e" font-size="10">No Poster</text></svg>';

            const rt = getRT(item);
            const rtBadge = rt !== null
                ? `<span class="badge rt ${rt >= 60 ? 'fresh' : ''}">${rt}% RT</span>`
                : '';

            const imdbBadge = item.imdbRating && item.imdbRating !== 'N/A'
                ? `<span class="badge imdb">IMDb ${item.imdbRating}</span>`
                : '';

            const genres = item.Genre && item.Genre !== 'N/A'
                ? item.Genre.split(', ').slice(0, 2).map(g => `<span class="badge genre">${g}</span>`).join('')
                : '';

            card.innerHTML = `
                <img src="${poster}" alt="${item.Title}" loading="lazy">
                <div class="card-info">
                    <h3>${item.Title}</h3>
                    <div class="meta">${item.Year} &middot; ${item.Type} &middot; ${item.Rated || 'NR'}</div>
                    <div class="badges">
                        <span class="badge rating">${item.Rated || 'NR'}</span>
                        ${imdbBadge}
                        ${rtBadge}
                        ${genres}
                    </div>
                </div>
            `;
            return card;
        }

        function showDetail(item) {
            const poster = item.Poster && item.Poster !== 'N/A' ? item.Poster : '';
            const rt = getRT(item);

            let ratingsHTML = '';
            if (item.Ratings) {
                ratingsHTML = item.Ratings.map(r =>
                    `<div class="detail-row"><span class="label">${r.Source}</span><span class="value">${r.Value}</span></div>`
                ).join('');
            }

            modalContent.innerHTML = `
                <h2>${item.Title}</h2>
                <div class="detail-meta">${item.Year} &middot; ${item.Rated || 'NR'} &middot; ${item.Runtime || 'N/A'}</div>
                ${poster ? `<img class="modal-poster" src="${poster}" alt="${item.Title}">` : ''}
                <div class="badges" style="margin-bottom:12px;">
                    ${item.Genre && item.Genre !== 'N/A' ? item.Genre.split(', ').map(g => `<span class="badge genre">${g}</span>`).join('') : ''}
                </div>
                <p class="plot">${item.Plot || 'No plot available.'}</p>
                <div class="detail-row"><span class="label">Director</span><span class="value">${item.Director || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">Actors</span><span class="value">${item.Actors || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">Language</span><span class="value">${item.Language || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">Box Office</span><span class="value">${item.BoxOffice || 'N/A'}</span></div>
                <div class="detail-row"><span class="label">Awards</span><span class="value">${item.Awards || 'N/A'}</span></div>
                ${ratingsHTML}
            `;
            modal.classList.add('open');
        }

        // Close modal
        modalClose.addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

        // Load more
        loadMoreBtn.addEventListener('click', async () => {
            currentPage++;
            loadMoreBtn.textContent = 'Loading...';
            await fetchPage();
            loadMoreBtn.textContent = 'Load More Results';
        });
    </script>
</body>
</html>
